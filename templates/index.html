<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureQR | Advanced QR Code Security System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>
          <i class="fas fa-qrcode"></i> SecureQR | QR Code Security System
        </h1>
        <div class="badge-container">
          <span class="badge"
            ><i class="fas fa-lock"></i> AES-128 Encryption</span
          >
          <span class="badge"
            ><i class="fas fa-fingerprint"></i> SHA-256 Integrity</span
          >
          <span class="badge"
            ><i class="fas fa-shield-alt"></i> Tamper Resistance</span
          >
          <span class="badge"
            ><i class="fas fa-python"></i> Python Backend</span
          >
        </div>
      </div>

      <div class="grid-2col">
        <!-- Left: QR Generation -->
        <div class="card">
          <h2><i class="fas fa-plus-circle"></i> Generate Secure QR Code</h2>
          <div class="input-group">
            <label><i class="fas fa-database"></i> Data to Encrypt:</label>
            <textarea
              id="inputData"
              rows="3"
              placeholder="Example: https://secure-bank.com/login or credentials..."
            ></textarea>
          </div>
          <button onclick="generateSecureQR()" id="generateBtn">
            <i class="fas fa-qrcode"></i> Generate Secure QR Code
          </button>
          <div class="qr-preview" id="qrPreview" style="display: none">
            <h4><i class="fas fa-qrcode"></i> Generated QR Code:</h4>
            <img id="qrImage" alt="QR Code" />
          </div>
        </div>

        <!-- Right: Verification -->
        <div class="card">
          <h2><i class="fas fa-shield-alt"></i> Verify & Check</h2>
          <div class="input-group">
            <label><i class="fas fa-code"></i> Enter QR Payload:</label>
            <textarea
              id="qrPayload"
              rows="3"
              placeholder="Paste the encrypted QR payload here..."
            ></textarea>
          </div>
          <button onclick="verifyQR()" class="btn-success">
            <i class="fas fa-check-circle"></i> Verify & Check
          </button>
          <button onclick="simulateTamper()" class="btn-danger">
            <i class="fas fa-bug"></i> Simulate Tampering
          </button>
          <div class="log-box" id="logBox">
            <i class="fas fa-info-circle"></i> Ready... Generate a secure QR
            code
          </div>
        </div>
      </div>
      <!-- Footer -->
      <div
        style="
          text-align: center;
          margin-top: 30px;
          color: white;
          padding: 20px;
        "
      >
        <p>
          <i class="fas fa-graduation-cap"></i> Prepared by: Sama Salem Ayyash &
          Rawan Fawaz Shhadeh
        </p>
        <p>Supervised by: Dr. Jihad Hamamra</p>
      </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
